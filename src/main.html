mily:Orbitron,sans-serif;font-size:30px;text-align:center}</style></head><body><canvas height=1080 id=canvas oncontextmenu=event.preventDefault() width=1920></canvas><div id=top style=display:none;z-index:1></div><div class="glass-panel sidebar"><div class=widget_text>Apps</div><div class=app-btn id=calc-btn><img alt=Kalkulator class=app-icon src=icons/calculator.svg></div><div class=app-btn id=note-btn><img alt=Notatnik class=app-icon src=icons/notepad.svg></div><div class=app-btn id=timer-btn><img alt=Timer class=app-icon src=icons/timer.svg></div><div class=app-btn id=settings-btn><img alt=Ustawienia class=app-icon src=icons/settings.svg></div></div><div class="glass-panel window"id=calc-win><div class=header id=calc-win-header>Calculator<div class=header-btn id=calc-close-btn>✕</div></div></div><div class="glass-panel window"id=note-win><div class=header id=note-win-header>Notepad<div class=header-btn id=note-close-btn>✕</div></div></div><div class="glass-panel window"id=timer-win><div class=header id=timer-win-header>Timer<div class=header-btn id=timer-close-btn>✕</div></div></div><div class="glass-panel window"id=settings-win><div class=header id=settings-win-header>Settings<div class=header-btn id=settings-close-btn>✕</div></div></div><div class="glass-panel clock"><div class=widget_text>CLOCK</div></div><script>var Module={canvas:document.getElementById("canvas")}</script><script src=script.js></script><script src=main.js async></script></body></html>
