<!DOCTYPE html>
<html lang="pl">
<link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet">

<head>
    <meta charset="utf-8">
    <title>Crystal OS</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
            font-family: 'Exo 2', 'Inter', sans-serif;
        }

        canvas#canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px rgba(80, 140, 255, 0.4);
            border: 2px solid #555;
            background: #111;
        }

        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100px;

            padding: 20px;
            background: #2f2f2f6e;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid #afafaf8e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 14px;

            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 20px;
            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        .clock {
            position: absolute;
            right: 0;
            top: 0;
            width: 200px;
            height: 80px;
            padding: 20px;
            background: #2f2f2f6e;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid #afafaf8e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;

        }

        .widget_text {
            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 30px;
            text-align: center;
        }


        .window {
            position: absolute;
            background: #1e1e1e;
            border: 1px solid #666;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <canvas id="canvas" width="1920" height="1080" oncontextmenu="event.preventDefault()"></canvas>

    <div class="sidebar">
        <div class="widget_text">Apps</div>
    </div>
    <div class="clock">
        <div class="widget_text">CLOCK</div>
    </div>

    <script>
        var Module = {
            canvas: document.getElementById('canvas')
        };
    </script>
    {{{ SCRIPT }}}
</body>

</html>
