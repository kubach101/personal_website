<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <title>Crystal OS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
            font-family: 'Exo 2', 'Inter', sans-serif;
        }

        canvas#canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            border: 2px solid #000000;
            background: #000000;
        }

        .glass-panel {
            background: #2f2f2f6e;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid #afafaf8e;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            color: #ffffff;
        }

        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100px;
            padding: 12px;
            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 1;
        }

        .app-icon {
            width: 60px;
            height: 60px;
        }

        .app-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border-width: 2px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0);
        }

        .app-btn.selected {
            border-color: #FF6B4A;
        }

        .window {
            position: absolute;
            left: 50;
            top: 50;
            padding: 8px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .window.dragged {
            border-color: #FF6B4A;
        }


        .header {
            width: 100%;
            height: 50px;
            padding: 12px 8px;
            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 20px;
            text-align: left;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: top;
        }

        textarea {
            resize: none;
            padding: 4px 12px;
            outline: none;
            background: #5a5a5a;
            border: 2px solid #5a5a5a9e;
            border-radius: 12px;

            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 15px;
            text-align: left;
        }

        textarea:focus {
            border-color: #FF6B4A;
        }

        textarea::selection {
            color: #000000;
            background-color: #FF6B4A;
        }

        input {
            resize: none;
            padding: 4px 12px;
            outline: none;
            background: #5a5a5a;
            border: 2px solid #5a5a5a9e;
            border-radius: 12px;

            color: #ffffff;
            font-family: Orbitron, sans-serif;
            text-align: left;
        }

        input:focus {
            border-color: #FF6B4A;
        }

        input::selection {
            color: #000000;
            background-color: #FF6B4A;
        }


        #calc-win {
            display: none;
            width: 300px;
            height: 400px;
        }

        #calc-input {
            width: 80%;
            height: 40px;
            font-size: 24px;
        }

        #note-win {
            display: none;
            width: 500px;
            height: 400px;
        }

        #note-textarea {
            width: 420px;
            height: 300px;
            font-size: 12px;
        }

        #timer-win {
            display: none;
            width: 300px;
            height: 200px;
        }

        #settings-win {
            display: none;
            width: 400px;
            height: 600px;
        }

        .header-btn {
            width: 24px;
            height: 24px;
            background: #5a5a5a;
            border: 2px solid #5a5a5a9e;
            border-radius: 4px;
            color: #ffffff;
            line-height: 24px;
            text-align: center;
            padding: 0;
            cursor: pointer;
        }

        .clock {
            position: absolute;
            right: 0;
            top: 0;
            width: 200px;
            height: 80px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
        }

        .widget_text {
            color: #ffffff;
            font-family: Orbitron, sans-serif;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
    <canvas id="canvas" width="1920" height="1080" oncontextmenu="event.preventDefault()"></canvas>
    <div id="top" style="display: none; z-index: 1;">
    </div>
    <div class="glass-panel sidebar">
        <div class="widget_text">Apps</div>
        <div id="calc-btn" class="app-btn">
            <img src="icons/calculator.svg" alt="Kalkulator" class="app-icon">
        </div>
        <div id="note-btn" class="app-btn">
            <img src="icons/notepad.svg" alt="Notatnik" class="app-icon">
        </div>
        <div id="timer-btn" class="app-btn">
            <img src="icons/timer.svg" alt="Timer" class="app-icon">
        </div>
        <div id="settings-btn" class="app-btn">
            <img src="icons/settings.svg" alt="Ustawienia" class="app-icon">
        </div>
    </div>

    <div id="calc-win" class="glass-panel window">
        <div id="calc-win-header" class="header">Calculator
            <div id="calc-close-btn" class="header-btn">✕</div>
        </div>
        <input id="calc-input" class="text-area" type="text">
    </div>

    <div id="note-win" class="glass-panel window">
        <div id="note-win-header" class="header">Notepad
            <div id="note-close-btn" class="header-btn">✕</div>
        </div>
        <textarea id="note-textarea" type="text" spellcheck="false"></textarea>
    </div>

    <div id="timer-win" class="glass-panel window">
        <div id="timer-win-header" class="header">Timer
            <div id="timer-close-btn" class="header-btn">✕</div>
        </div>
    </div>

    <div id="settings-win" class="glass-panel window">
        <div id="settings-win-header" class="header">Settings
            <div id="settings-close-btn" class="header-btn">✕</div>
        </div>
    </div>

    <div class="glass-panel clock">
        <div class="widget_text">CLOCK</div>
    </div>

    <script>
        var Module = {
            canvas: document.getElementById('canvas')
        };
    </script>
    <script src="script.js"></script>
    {{{ SCRIPT }}}
</body>

</html>
